name: On PR
on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  pre-commit:
    name: 🔬 Pre-Commit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v6
      - name: 🛠️ Install pre-commit
        run: pip install pre-commit
      - name: ✅ Run pre-commit
        run: pre-commit run --all-files
